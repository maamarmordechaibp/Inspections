<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Confirm Sensitive Action on DouseFire</title>
  </head>
  <body style="margin:0;padding:0;background:#f1f5f9;font-family:Montserrat,Arial,sans-serif;color:#111827;">
    <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="background:#f1f5f9;padding:28px 12px;">
      <tr>
        <td align="center">
          <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="max-width:620px;background:#ffffff;border-radius:18px;overflow:hidden;border:1px solid #dbe3ee;box-shadow:0 10px 30px rgba(10,22,40,0.08);">
            <tr>
              <td style="background:#0a1628;background-image:linear-gradient(135deg,#0a1628 0%,#12294a 100%);padding:26px 30px;text-align:center;">
                <img src="{{ .SiteURL }}/logo-email.png" alt="DouseFire" width="210" style="display:block;border:0;outline:none;text-decoration:none;margin:0 auto 12px;max-width:100%;height:auto;" />
                <div style="font-size:13px;color:#dbe7f5;letter-spacing:0.6px;">FIRE INSPECTION PLATFORM</div>
              </td>
            </tr>
            <tr>
              <td style="padding:30px 30px 18px;">
                <div style="display:inline-block;background:#fef2f2;color:#b91c1c;font-size:12px;font-weight:700;letter-spacing:0.4px;border-radius:999px;padding:6px 12px;margin-bottom:14px;">SECURITY CHECK</div>
                <h1 style="margin:0 0 12px;font-size:26px;line-height:1.2;color:#0f172a;">Confirm this secure action</h1>
                <p style="margin:0 0 22px;font-size:15px;line-height:1.75;color:#475569;">
                  We need to verify this sensitive action for your DouseFire account <strong style="color:#0f172a;">{{ .Email }}</strong>.
                </p>
                <table role="presentation" cellspacing="0" cellpadding="0" style="margin:0 0 22px;">
                  <tr>
                    <td>
                      <a href="{{ .ConfirmationURL }}" style="display:inline-block;background:#f5c518;color:#0a1628;text-decoration:none;font-weight:800;font-size:14px;padding:13px 20px;border-radius:10px;letter-spacing:0.2px;">Verify Action</a>
                    </td>
                  </tr>
                </table>
                <p style="margin:0;font-size:12px;line-height:1.75;color:#64748b;word-break:break-all;">Verification link: {{ .ConfirmationURL }}</p>
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
